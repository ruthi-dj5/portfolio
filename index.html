document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fp>\n    <\u002Fdiv>\n    <div style=\"border-bottom:1px solid rgba(26,22,19,.16)\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"5\">\n        <a href=\"{{ p.url }}\" target=\"_blank\" rel=\"noopener\" onmouseenter=\"{{ p.onEnter }}\" onmousemove=\"{{ onMove }}\" onmouseleave=\"{{ onLeave }}\" style=\"display:grid;grid-template-columns:54px 1fr auto;gap:20px;align-items:center;padding:clamp(20px,2.6vw,34px) 0;border-top:1px solid rgba(26,22,19,.16);text-decoration:none;color:inherit;transition:color .3s ease,padding-left .4s cubic-bezier(.16,1,.3,1)\" style-hover=\"{{ rowHover }}\">\n          <span style=\"font-size:13px;color:#8C8173;font-variant-numeric:tabular-nums\">{{ p.num }}<\u002Fspan>\n          <span style=\"display:flex;align-items:baseline;gap:18px;flex-wrap:wrap\">\n            <span style=\"font-family:'Instrument Serif',serif;font-size:clamp(1.7rem,3.6vw,2.9rem);line-height:1\">{{ p.name }}<\u002Fspan>\n            <span style=\"font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#8C8173\">{{ p.cat }}<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-size:13px;color:#8C8173;font-variant-numeric:tabular-nums\">{{ p.year }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"about\" style=\"padding:clamp(90px,13vw,180px) clamp(20px,5vw,90px) 0;scroll-margin-top:80px\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr)) 2fr;gap:clamp(28px,5vw,80px);align-items:start\">\n      <div data-reveal=\"\" style=\"font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent,#C0432A);font-weight:600\">(About)<\u002Fdiv>\n      <div data-reveal=\"\">\n        <p style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(1.9rem,3.6vw,3.4rem);line-height:1.18;margin:0 0 1em;letter-spacing:-.005em\">Sruthi is a creative force who brings brands to life through <em style=\"color:var(--accent,#C0432A)\">graphic design<\u002Fem> and brand development — shaping logos, packaging and identities with warmth, intention and craft.<\u002Fp>\n        <p style=\"font-size:clamp(15px,1.4vw,18px);line-height:1.6;color:#3a322b;max-width:52ch;margin:0 0 2.4em\">Off the clock, you'll find her making craft and digital artwork — the same hands-on curiosity she brings to every brand she builds.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n          <span style=\"border:1px solid rgba(26,22,19,.25);border-radius:100px;padding:8px 16px;font-size:12px;letter-spacing:.05em\">Branding<\u002Fspan>\n          <span style=\"border:1px solid rgba(26,22,19,.25);border-radius:100px;padding:8px 16px;font-size:12px;letter-spacing:.05em\">Visual Identity<\u002Fspan>\n          <span style=\"border:1px solid rgba(26,22,19,.25);border-radius:100px;padding:8px 16px;font-size:12px;letter-spacing:.05em\">Art Direction<\u002Fspan>\n          <span style=\"border:1px solid rgba(26,22,19,.25);border-radius:100px;padding:8px 16px;font-size:12px;letter-spacing:.05em\">Packaging Design<\u002Fspan>\n          <span style=\"border:1px solid rgba(26,22,19,.25);border-radius:100px;padding:8px 16px;font-size:12px;letter-spacing:.05em\">Logo Design<\u002Fspan>\n          <span style=\"border:1px solid rgba(26,22,19,.25);border-radius:100px;padding:8px 16px;font-size:12px;letter-spacing:.05em\">Digital<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer id=\"contact\" style=\"margin-top:clamp(100px,14vw,200px);background:#1A1613;color:#F2ECE1;padding:clamp(70px,9vw,130px) clamp(20px,5vw,90px) 40px;scroll-margin-top:80px\">\n    <div style=\"font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent,#C0432A);font-weight:500;margin-bottom:24px\">Let's work together<\u002Fdiv>\n    <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(2.6rem,9vw,8rem);line-height:.96;letter-spacing:-.015em;margin:0 0 .5em;max-width:13ch\">Have a brand worth building?<\u002Fh2>\n    <a href=\"mailto:sruthidheeraj55@gmail.com\" style=\"display:inline-block;font-family:'Instrument Serif',serif;font-size:clamp(1.5rem,4vw,3rem);color:#F2ECE1;text-decoration:none;border-bottom:1px solid rgba(242,236,225,.35);padding-bottom:6px;transition:color .3s ease,border-color .3s ease\" style-hover=\"{{ mailHover }}\">sruthidheeraj55@gmail.com<\u002Fa>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px 28px;margin-top:clamp(48px,7vw,90px);font-size:13px;letter-spacing:.08em;text-transform:uppercase\">\n      <a href=\"https://www.behance.net/sruthidj/\" target=\"_blank\" rel=\"noopener\" style=\"color:#F2ECE1;text-decoration:none;opacity:.75;transition:opacity .25s\" style-hover=\"{{ linkHover }}\">Behance ↗<\u002Fa>\n      <a href=\"http://www.linkedin.com/in/sruthivsuresh\" target=\"_blank\" rel=\"noopener\" style=\"color:#F2ECE1;text-decoration:none;opacity:.75;transition:opacity .25s\" style-hover=\"{{ linkHover }}\">LinkedIn ↗<\u002Fa>\n      <a href=\"mailto:sruthidheeraj55@gmail.com\" style=\"color:#F2ECE1;text-decoration:none;opacity:.75;transition:opacity .25s\" style-hover=\"{{ linkHover }}\">Email ↗<\u002Fa>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;gap:16px;margin-top:clamp(56px,8vw,110px);padding-top:24px;border-top:1px solid rgba(242,236,225,.18);font-size:12px;letter-spacing:.04em;color:rgba(242,236,225,.6)\">\n      <span>© 2026 Sruthi Suresh — Graphic &amp; Brand Designer<\u002Fspan>\n      <span>Portfolio, reimagined<\u002Fspan>\n      <a href=\"#top\" style=\"color:rgba(242,236,225,.6);text-decoration:none\" style-hover=\"{{ linkHover }}\">Back to top ↑<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;accentTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Clay&quot;,&quot;Oxblood&quot;,&quot;Forest&quot;,&quot;Cobalt&quot;],&quot;default&quot;:&quot;Clay&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  projects = [\n    { name: 'Grated', cat: 'Vegan Cheese · Branding · Packaging', year: '2022', url: 'https://sruthis.myportfolio.com/grated', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/adb2cd92-07b1-40d0-8fc8-0162730a5205_car_16x9.jpg?h=18fc1769796cadd30fb71078ec075200' },\n    { name: 'Soapy', cat: 'Natural Skincare · Branding · Packaging', year: '2022', url: 'https://sruthis.myportfolio.com/soapy', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/0500f651-8b5d-4a47-8b4a-e900139f844c_car_16x9.jpg?h=6020a2da64e6fe41cf60f90141c07ece' },\n    { name: 'Harper Reid', cat: 'Wedding Photography · Brand Identity', year: '2022', url: 'https://sruthis.myportfolio.com/harperraid', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/2b976538-52b2-4179-95c7-6d1cf8b3f721_car_16x9.jpg?h=e821f2f2ffc1cb91cbe25ce40c2ddcf1' },\n    { name: 'Oopsie Daisy', cat: 'Local Florist · Brand Identity', year: '2022', url: 'https://sruthis.myportfolio.com/oopsie-daisy', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/a8a3f72f-181c-48d3-b0af-7cb358fb53b8_car_16x9.jpg?h=d27150d0f5a038d236de1dda2b943114' },\n    { name: 'Dando Auto Parts', cat: 'Automotive · Logo · Brand Mark', year: '2022', url: 'https://sruthis.myportfolio.com/dando-auto-parts', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/394be501-756b-4801-8a25-15e98b89295b_car_16x9.jpg?h=568c96ac570d0d6916d1c920d188295a' },\n    { name: 'Presentation Design', cat: 'PowerPoint · Slide System', year: '2022', url: 'https://sruthis.myportfolio.com/powerpoint', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/f8d70c3b-7c48-4168-ade1-2da020a221ee_car_16x9.GIF?h=7fc0ccc90052149de90fb31aef7b39e2' },\n    { name: 'Infographics', cat: 'Information Design · Layout', year: '2022', url: 'https://sruthis.myportfolio.com/infographics', img: 'https://cdn.myportfolio.com/9073e09a-1b2d-4fd4-a449-8a5bab82e03f/6ce30035-aae1-43db-8ec1-ca746b6b6cde_car_16x9.jpg?h=265007fff3f7aea2312e7165df1fa009' },\n  ];\n\n  _revealed = new Set();\n\n  renderVals() {\n    // Memoize so references stay stable across renders (avoids a re-render loop\n    // that would restart entrance animations and clobber scroll reveals).\n    if (!this._vals) {\n      const projects = this.projects.map((p, i) => ({\n        ...p,\n        num: String(i + 1).padStart(2, '0'),\n        onEnter: () => this._enter(p.img),\n      }));\n      this._vals = {\n        projects,\n        rootRef: (el) => { this.rootEl = el; },\n        setPreview: (el) => { this.previewEl = el; },\n        setPreviewImg: (el) => { this.previewImgEl = el; },\n        onMove: (e) => this._move(e),\n        onLeave: () => this._leave(),\n        cardHover: { color: 'var(--accent,#C0432A)' },\n        imgHover: { transform: 'scale(1.05)' },\n        rowHover: { color: 'var(--accent,#C0432A)', paddingLeft: '14px' },\n        mailHover: { color: 'var(--accent,#C0432A)', borderColor: 'var(--accent,#C0432A)' },\n        linkHover: { opacity: 1 },\n      };\n    }\n    return this._vals;\n  }\n\n  _enter(src) {\n    if (this.previewImgEl) this.previewImgEl.src = src;\n    if (this.previewEl) this.previewEl.style.opacity = '1';\n  }\n  _move(e) {\n    if (this.previewEl) this.previewEl.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%) rotate(-2deg)`;\n  }\n  _leave() {\n    if (this.previewEl) this.previewEl.style.opacity = '0';\n  }\n\n  _applyAccent() {\n    const map = { Clay: '#C0432A', Oxblood: '#7E2B23', Forest: '#3E5641', Cobalt: '#2E4A8B' };\n    const c = map[this.props.accentTheme] || '#C0432A';\n    if (this.rootEl) this.rootEl.style.setProperty('--accent', c);\n  }\n\n  componentDidMount() {\n    this._applyAccent();\n    const root = this.rootEl || document;\n    const els = Array.from(root.querySelectorAll('[data-reveal]'));\n    // Content is visible by default; the observer adds a transform-only flourish\n    // when each element scrolls into view. (No opacity gating, so nothing can be\n    // left hidden if animations are unavailable.)\n    if (this.props.reduceMotion) return;\n    const io = new IntersectionObserver((ents) => {\n      ents.forEach((ent) => {\n        if (ent.isIntersecting) {\n          const el = ent.target;\n          const sibs = Array.from(el.parentElement.children).filter((c) => c.hasAttribute('data-reveal'));\n          const idx = Math.max(0, sibs.indexOf(el));\n          el.style.animation = 'revealUp .85s cubic-bezier(.16,1,.3,1) both';\n          el.style.animationDelay = (idx * 0.07) + 's';\n          io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach((e) => io.observe(e));\n  }\n\n  componentDidUpdate() { this._applyAccent(); }\n\n  componentWillUnmount() { if (this._fallback) clearTimeout(this._fallback); }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
